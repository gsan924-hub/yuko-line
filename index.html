<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公式LINE 友だち登録</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top center, rgba(255, 215, 100, 0.18), transparent 28%),
        linear-gradient(180deg, #090909 0%, #111111 45%, #050505 100%);
      padding: 20px 14px 40px;
    }

    .wrap { max-width: 440px; margin: 0 auto; }

    .card {
      background: linear-gradient(180deg, rgba(20,20,20,0.96), rgba(12,12,12,0.98));
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: 26px;
      padding: 30px 18px 34px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,0.45);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 18px;
      border: 3px solid #d4af37;
    }

    .lead {
      margin-bottom: 22px;
      font-size: 16px;
      line-height: 1.8;
    }

    .main-btn {
      display: block;
      text-decoration: none;
      background: #06C755;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      padding: 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    .panel {
      margin-top: 18px;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 16px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: bold;
      color: #f5d778;
      margin-bottom: 10px;
    }

    .id-box {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .gold-btn {
      background: #e2c15b;
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
    }

    .qr-code {
      width: 200px;
      margin: 10px auto;
      display: block;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <!-- プロフィール画像 -->
      <img src="IMG_3160.jpeg" class="profile-img">

      <!-- テキスト -->
      <p class="lead">
        物販ONE講師の堤です！<br>
        皆さんとお話しするのを楽しみにしています😊
      </p>

      <!-- LINEボタン -->
      <a href="https://lin.ee/p2wVOCe" class="main-btn">
        友だち追加する
      </a>

      <!-- LINE ID -->
      <div class="panel">
        <div class="panel-title">LINE IDで追加</div>
        <div class="id-box">@858gqpfo</div>
        <button class="gold-btn" onclick="copyLineId()">コピー</button>
      </div>

      <!-- QRコード -->
      <div class="panel">
        <div class="panel-title">QRコードで追加</div>
        <img src="qr.png" class="qr-code">
      </div>

      <!-- フッター -->
      <div class="footer">
        追加後にメッセージいただけるとスムーズです
      </div>

    </div>
  </div>

  <script>
    function copyLineId() {
      navigator.clipboard.writeText("@858gqpfo");
      alert("コピーしました");
    }
  </script>

</body>
</html>
